        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        notes:
          type: string
        metadata:
          type: object

    # ─── Bookings ──────────────────────────────────────────────────────────────
    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled, no_show]
        service:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        resource:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        customer:
          type: object
          properties:
            id:
              type: string
              format: uuid
            first_name:
              type: string
            last_name:
              type: string
        start_time:
          type: string
          format: date-time
          description: UTC
        start_time_local:
          type: string
          description: Tenant local time
        end_time:
          type: string
          format: date-time
          description: UTC
        end_time_local:
          type: string
          description: Tenant local time
        party_size:
          type: integer
        notes:
          type: string
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        cancellation_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BookingCreate:
      type: object
      required: [service_id, customer_id, start_time]
      properties:
        service_id:
          type: string
          format: uuid
        resource_id:
          type: string
          format: uuid
          nullable: true
          description: "Omit or null for 'any available' assignment"
        customer_id:
          type: string
          format: uuid
        start_time:
          type: string
